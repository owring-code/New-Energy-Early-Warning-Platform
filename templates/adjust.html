<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>阈值调整面板</title>
    <style>
        * {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: "微软雅黑";
        }

        body{color:#fff;font-size: 16px; background: #033c76 url(../images/bg5.jpg);
}

        .adjust-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 28, 60, 0.8);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 206, 252, 0.3);
            border: 1px solid rgba(0, 234, 255, 0.35);
            backdrop-filter: blur(8px);
        }

        .adjust-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .adjust-header h2 {
            font-size: 24px;
            color: #00deff;
            text-shadow: 0 0 10px rgba(0, 222, 255, 0.5);
            margin-bottom: 10px;
        }

        .adjust-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .adjust-item {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(0, 40, 80, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(0, 150, 255, 0.2);
            transition: all 0.3s ease;
        }

        .adjust-item:hover {
            background: rgba(0, 60, 120, 0.4);
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.2);
        }

        .adjust-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .adjust-title h3 {
            font-size: 18px;
            color: #00e4ff;
        }

        .adjust-title .value-display {
            background: rgba(0, 150, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: #fff;
            min-width: 80px;
            text-align: center;
            border: 1px solid rgba(0, 234, 255, 0.35);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-input {
            flex: 1;
        }

        .number-input {
            width: 80px;
            padding: 8px 12px;
            background: rgba(0, 40, 80, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .number-input:focus {
            border-color: #00e4ff;
            box-shadow: 0 0 10px rgba(0, 228, 255, 0.5);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(0, 150, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #00e4ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 228, 255, 0.8);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #00ffff;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
        }

        .btn-save {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            box-shadow: 0 0 15px rgba(0, 180, 219, 0.5);
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #00c6fb, #0099cc);
            box-shadow: 0 0 20px rgba(0, 198, 251, 0.7);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #00e4ff;
            border: 1px solid rgba(0, 228, 255, 0.5);
        }

        .btn-reset:hover {
            background: rgba(0, 228, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 228, 255, 0.3);
        }

        .unit {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-left: 5px;
        }

        /* Return button styles */
        .return-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.6rem;
            font-size: 0.8rem;
            color: #00eaff;
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(0, 234, 255, 0.35);
            border-radius: 0.6rem;
            text-decoration: none;
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 12px rgba(0, 232, 255, 0.35);
            transition: all 0.3s ease;
            position: absolute;
            top: 1rem;
            left: 3rem;
            z-index: 1000;
        }

        .return-btn i {
            margin-right: 0.3rem;
            font-size: 0.75rem;
        }

        .return-btn:hover {
            background: rgba(0, 232, 255, 0.22);
            box-shadow: 0 0 16px rgba(0, 232, 255, 0.8);
            color: #ffffff;
        }
    </style>
</head>
<body>
        <a href="{{ url_for('index') }}" class="return-btn">
            <i class="iconfont">←</i>返回平台
        </a>

    <div class="adjust-container">
        <div class="adjust-header">
            <h2>阈值调整面板</h2>
            <p>拖动滑块或直接输入数值调整系统阈值参数</p>
        </div>

        <div class="adjust-item">
            <div class="adjust-title">
                <h3>电压阈值 <span class="unit">(V)</span></h3>
                <div class="value-display" id="voltageValue">4.20</div>
            </div>
            <div class="slider-container">
                <div class="slider-input">
                    <input type="range" id="voltageSlider" min="1.0" max="6.0" step="0.1" value="4.20">
                </div>
                <input type="number" class="number-input" id="voltageInput" min="1.0" max="6.0" step="0.1" value="4.20">
            </div>
        </div>

        <div class="adjust-item">
            <div class="adjust-title">
                <h3>温度阈值 <span class="unit">(℃)</span></h3>
                <div class="value-display" id="tempValue">100.00</div>
            </div>
            <div class="slider-container">
                <div class="slider-input">
                    <input type="range" id="tempSlider" min="-100" max="150" step="1" value="100">
                </div>
                <input type="number" class="number-input" id="tempInput" min="-100" max="150" step="1" value="100">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-save" id="saveBtn">保存设置</button>
            <button class="btn btn-reset" id="resetBtn">恢复默认</button>
        </div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const voltageSlider = document.getElementById('voltageSlider');
    const voltageInput = document.getElementById('voltageInput');
    const voltageValue = document.getElementById('voltageValue');

    const tempSlider = document.getElementById('tempSlider');
    const tempInput = document.getElementById('tempInput');
    const tempValue = document.getElementById('tempValue');

    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 默认值定义
    const DEFAULT_VALUES = {
        voltage: 4.20,
        temperature: 100
    };

    // 从后端加载初始值
    async function loadThresholds() {
        try {
            const response = await fetch('/threshold');
            const data = await response.json();

            voltageSlider.value = data.voltage;
            voltageInput.value = data.voltage.toFixed(2);
            voltageValue.textContent = data.voltage.toFixed(2);

            tempSlider.value = data.temperature;
            tempInput.value = data.temperature.toFixed(0);
            tempValue.textContent = data.temperature.toFixed(0);
        } catch (error) {
            console.error('无法加载阈值:', error);
        }
    }

    // 保存设置
    saveBtn.addEventListener('click', async () => {
        const payload = {
            voltage: parseFloat(voltageInput.value),
            temperature: parseFloat(tempInput.value)
        };

        try {
            const response = await fetch('/threshold', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('阈值保存成功！');
            } else {
                alert('保存失败，请重试。');
            }
        } catch (error) {
            console.error('保存出错:', error);
        }
    });

    // 恢复默认
    resetBtn.addEventListener('click', () => {
        voltageSlider.value = DEFAULT_VALUES.voltage;
        voltageInput.value = DEFAULT_VALUES.voltage.toFixed(2);
        voltageValue.textContent = DEFAULT_VALUES.voltage.toFixed(2);

        tempSlider.value = DEFAULT_VALUES.temperature;
        tempInput.value = DEFAULT_VALUES.temperature.toFixed(0);
        tempValue.textContent = DEFAULT_VALUES.temperature.toFixed(0);
    });

    // 同步滑块与数字输入
    function sync(slider, input, display, isFloat) {
        slider.addEventListener('input', () => {
            input.value = slider.value;
            display.textContent = isFloat ? parseFloat(slider.value).toFixed(2) : parseInt(slider.value);
        });

        input.addEventListener('input', () => {
            slider.value = input.value;
            display.textContent = isFloat ? parseFloat(input.value).toFixed(2) : parseInt(input.value);
        });
    }

    sync(voltageSlider, voltageInput, voltageValue, true);
    sync(tempSlider, tempInput, tempValue, false);

    loadThresholds(); // 初始化
});
</script>
</body>
</html>
