    function time()
    {
       clearTimeout(t);//清除定时器
       dt = new Date();
		var y=dt.getFullYear();
		var mt=dt.getMonth()+1;
		var day=dt.getDate();
       var h=dt.getHours();//获取时
       var m=dt.getMinutes();//获取分
       var s=dt.getSeconds();//获取秒
       document.getElementById("showTime").innerHTML = y+"/"+mt+"/"+day+" "+h+":"+m+":"+s+"";
       t = setTimeout(time,1000); //设定定时器，循环运行     
    }

                <html lang="zh">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>充电状态</title>
                    <style>
                        /* 呼吸光效 */
                        @keyframes pulse {
                            0% {
                                box-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
                            }
                            50% {
                                box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
                            }
                            100% {
                                box-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
                            }
                        }

                       /* 充电状态盒子 */
                        .box_cd {
                            width: 100%;
                            max-width: 400px;
                            margin: 40px auto;
                            padding: 20px;
                            background: linear-gradient(135deg, rgba(10, 25, 50, 0.9), rgba(0, 150, 255, 0.8));
                            border-radius: 15px;
                            box-shadow: 0px 0px 10px rgba(0, 150, 255, 0.5);
                            position: relative;
                            overflow: hidden;
                            animation: pulse 2s infinite ease-in-out;
                            color: #fff;
                            text-align: center;
                            font-size: 18px;
                            font-weight: bold;
                            display: flex;  /* 使用 flexbox 布局 */
                            justify-content: center;  /* 水平居中 */
                            align-items: center;  /* 垂直居中 */
                            flex-direction: column;  /* 子元素上下排列 */
                        }

                        /* 充电图标和文本容器 */
                        .charge-container {
                            display: flex;  /* 使图标和文字保持水平排列 */
                            align-items: center;  /* 垂直居中对齐 */
                            position: relative;
                            top: -5px;  /* 整体上移 5px，可以根据需要调整 */
                        }

                        /* 充电图标 */
                        .charge-icon {
                            display: inline-block;
                            width: 30px;  /* 适当调整大小 */
                            height: 30px;
                            position: relative;
                            top: 5px;  /* 向下移动 5px，可以根据需要调整 */
                            background: url('../images/充电图标.png') no-repeat center center;
                            background-size: contain;
                            margin-right: 10px;
                        }

                        /* 充电进度条 */
                        .charge-bar {
                            width: 100%;
                            height: 8px;
                            background: rgba(255, 255, 255, 0.2);
                            border-radius: 5px;
                            overflow: hidden;
                            margin-top: 10px;
                            position: relative;
                        }

                        /* 充电动画 */
                        .charge-bar::before {
                            content: "";
                            display: block;
                            width: 30%;
                            height: 100%;
                            background: linear-gradient(to right, #00ff99, #00ccff);
                            border-radius: 5px;
                            animation: charging 2s infinite linear;
                        }

                        @keyframes charging {
                            0% {
                                transform: translateX(-100%);
                            }
                            100% {
                                transform: translateX(100%);
                            }
                        }
                    </style>
                </head>
                <body>
                    <div class="box_cd">
                        <div class="charge-container">
                            <span class="charge-icon"></span>
                            正在充电...
                        </div>
                        <div class="charge-bar"></div>
                    </div>



                </body>
